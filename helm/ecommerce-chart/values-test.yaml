# Test environment values
namespace: test

replicaCount: 2

image:
  repository: mrsridoc/ecommerce-site
  tag: test
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 80
  nodePort: 30008

deployment:
  labels:
    app: ecommerce-site
    environment: test

resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 150m
    memory: 192Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60