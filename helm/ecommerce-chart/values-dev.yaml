# Development environment values
namespace: dev

replicaCount: 1

image:
  repository: mrsridoc/ecommerce-site
  tag: v1
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 80
  nodePort: 30007

deployment:
  labels:
    app: ecommerce-site
    environment: dev

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3