# Default values for ecommerce-chart
namespace: default

replicaCount: 2

image:
  repository: mrsridoc/ecommerce-site
  tag: v1
  pullPolicy: IfNotPresent

container:
  port: 80
  name: ecommerce-container

service:
  name: ecommerce-service
  type: NodePort
  port: 80
  targetPort: 80
  nodePort: 30007

deployment:
  name: ecommerce-deployment
  labels:
    app: ecommerce-site
    environment: production

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: ecommerce.local
      paths:
        - path: /
          pathType: Prefix
  tls: []